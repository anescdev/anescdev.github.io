<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/style.css">
	<script src="https://code.jquery.com/jquery-3.5.1.js" integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc=" crossorigin="anonymous"></script>
	<script src="https://kit.fontawesome.com/b2949f16db.js" crossorigin="anonymous"></script>
	<script src="js/main.js" type="text/javascript"></script>
	<title>Calculadora JS</title>
</head>
<body>
	<div class="modal">
		<div>
			<i class="fas fa-times-circle" id="quitModal"></i>
		</div>
		<div id="resultBox">
			<p id="resultadoText">El resultado es: </p>
		</div>
	</div>
	<h1>Calculadora JavaScript <br> Manuel Jesús Ruiz García</h1>
	<br>
	<div id="content-calc">
		<br>
		<div class="calcItem">
			<input type="text" name="inputOne" class="textInput" id="inputOne" required="">
			<label for="inputOne">Primer dígito</label>
		</div>
		<br>
		<div class="calcItem">
			<input type="text" name="inputTwo" class="textInput" id="inputTwo" required="">
			<label for="inputTwo">Segundo dígito</label>
		</div>
		<br>
		<div class="calcItem">
			<input type="button" value="Sumar" class="btn" id="btnSum">
			<input type="button" value="Restar" class="btn" id="btnSub">
			<input type="button" value="Multiplicar" class="btn" id="btnMul">
			<input type="button" value="Dividir" class="btn" id="btnDiv">
		</div>
	</div>
</body>
</html>
